server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml font/woff2;

    # SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API calls to Spring Boot backend
    location /api/ {
        proxy_pass         http://backend:6060/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Proxy Swagger UI
    location /swagger-ui/ {
        proxy_pass         http://backend:6060/swagger-ui/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /v3/api-docs {
        proxy_pass         http://backend:6060/v3/api-docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
