  # ── Dashboard ────────────────────────────────────────────────────────────
  /api/dashboard/summary:
    get:
      tags: [Dashboard]
      operationId: getDashboardSummary
      summary: Get dashboard summary
      description: |
        Returns the computed financial summary for the authenticated user, including:
        - Net Worth (Total Assets - Total Liabilities)
        - Liquid Assets (excludes NPS, EPF, real estate)
        - Income PA, Savings PA, Basic Expense PA
        - Emergency Surplus/Deficit
        - Runway (months and years of expenses covered by liquid assets)
        - F.I.R.E. Amount (25× annual non-savings expenses)
        - F.I.R.E. Diff and Progress %
        - Years to FIRE (future value of annuity calculation)
        - Retirement months left
        - Total monthly investment SIP

        All values are computed server-side from the current financial profile.
      responses:
        "200":
          description: Dashboard summary with all computed metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Snapshots ────────────────────────────────────────────────────────────
  /api/snapshots:
    post:
      tags: [Snapshots]
      operationId: createSnapshot
      summary: Take a snapshot
      description: |
        Captures the current financial state as a point-in-time snapshot.
        This can be triggered manually or by a scheduled job.
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      tags: [Snapshots]
      operationId: getSnapshots
      summary: Get all snapshots
      description: |
        Returns all historical snapshots for the authenticated user,
        ordered by snapshotDate ascending. Used for the "Net Worth Over Time" chart.
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter snapshots from this date (inclusive)
          example: "2025-01-01"
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Filter snapshots up to this date (inclusive)
          example: "2026-12-31"
      responses:
        "200":
          description: List of snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Snapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/snapshots/latest:
    get:
      tags: [Snapshots]
      operationId: getLatestSnapshot
      summary: Get latest snapshot
      description: Returns the most recent snapshot for the authenticated user.
      responses:
        "200":
          description: Latest snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Snapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No snapshots found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
